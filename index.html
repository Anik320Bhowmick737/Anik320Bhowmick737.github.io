<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GSAP FIX TEST</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.hero {
  background: #1e3a8a;
}

.content {
  background: #0b1220;
  opacity: 0;
  transform: translateY(50px);
}

.box {
  padding: 20px;
  background: rgba(255,255,255,0.1);
  margin-top: 10px;
}
</style>
</head>

<body>

<section class="hero">
  <h1>HERO SECTION</h1>
  <p>Scroll down</p>
</section>

<section class="content">
  <h2>CONTENT SECTION</h2>
  <div class="box">Card 1</div>
  <div class="box">Card 2</div>
</section>

<script>
window.addEventListener("load", () => {

  // 🔥 HARD CHECK (IMPORTANT)
  if (!window.gsap || !window.ScrollTrigger) {
    document.body.innerHTML = "<h1 style='color:red'>GSAP FAILED TO LOAD</h1>";
    return;
  }

  gsap.registerPlugin(ScrollTrigger);

  console.log("GSAP + ScrollTrigger OK");

  gsap.timeline({
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=200%",   // IMPORTANT: more scroll distance
      scrub: true,
      pin: true,
      markers: true   // 👈 TURN ON DEBUG VISUALLY
    }
  })
  .to(".hero", {
    opacity: 0,
    y: -80
  })
  .to(".content", {
    opacity: 1,
    y: 0
  }, "<");

});
</script>

</body>
</html>
