<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* SECTIONS */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  position: relative;
}

/* HERO */
.hero {
  background: radial-gradient(circle at 30% 30%, #1e3a8a, transparent 60%);
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
}

/* CONTENT */
.content {
  background: #0b1220;
  opacity: 1;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  width: 80%;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 12px;
  transform: translateY(40px);
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>AI Beyond the Surface</h1>
  <p>Scroll to explore</p>
</section>

<!-- CONTENT -->
<section class="content">
  <div class="grid">

    <div class="card">Hat Matrix</div>
    <div class="card">Gradient Descent</div>
    <div class="card">Eigen Intuition</div>

  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load", () => {

  // 🌊 MASTER TIMELINE (Apple-style pacing)
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=180%",   // 👈 key improvement (longer scroll = premium feel)
      scrub: 1,        // smoother than true scrub:true
      pin: true
    }
  });

  // HERO exit (slow fade + lift)
  tl.to(".hero", {
    opacity: 0,
    y: -120,
    ease: "power2.out"
  });

  // CONTENT background fade in (delayed overlap)
  tl.from(".content", {
    opacity: 0,
    y: 80,
    ease: "power2.out"
  }, "<0.2");

  // CARD stagger reveal (this is what makes it feel premium)
  tl.to(".card", {
    opacity: 1,
    y: 0,
    stagger: 0.15,
    duration: 0.6,
    ease: "power3.out"
  }, "-=0.4");

});
</script>

</body>
</html>
