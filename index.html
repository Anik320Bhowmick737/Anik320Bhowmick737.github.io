<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* SECTIONS */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* HERO */
.hero {
  background: radial-gradient(circle at 30% 30%, #1e3a8a, transparent 60%);
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
}

/* CONTENT */
.content {
  background: #0b1220;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  width: 80%;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: #38bdf8;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>AI Beyond the Surface</h1>
  <p>Scroll to explore</p>
</section>

<!-- CONTENT -->
<section class="content">
  <div class="grid">

    <div class="card">
      <h3>Hat Matrix</h3>
      <p>Projection & geometry intuition</p>
    </div>

    <div class="card">
      <h3>Gradient Descent</h3>
      <p>Optimization intuition</p>
    </div>

    <div class="card">
      <h3>Eigen Intuition</h3>
      <p>Linear transformations</p>
    </div>

  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load", () => {

  // PIN HERO + FADE OUT
  gsap.timeline({
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=100%",
      scrub: true,
      pin: true
    }
  })
  .to(".hero", {
    opacity: 0,
    y: -60,
    ease: "none"
  });

});
</script>

</body>
</html>
