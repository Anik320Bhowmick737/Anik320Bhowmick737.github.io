<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* 🔥 IMPORTANT: stack everything instead of flow */
.stage {
  position: relative;
  height: 200vh; /* creates scroll space */
}

/* HERO + CONTENT OVERLAP */
.hero, .content {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* HERO */
.hero {
  background: radial-gradient(circle at 30% 30%, #1e3a8a, transparent 60%);
  z-index: 2;
}

/* CONTENT OVERLAY */
.content {
  background: #0b1220;
  z-index: 1;
  opacity: 0;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  width: 80%;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 12px;
  opacity: 0;
  transform: translateY(40px);
}
</style>
</head>

<body>

<div class="stage">

  <!-- HERO -->
  <section class="hero">
    <h1>AI Beyond the Surface</h1>
    <p>Scroll to explore</p>
  </section>

  <!-- CONTENT -->
  <section class="content">
    <div class="grid">
      <div class="card">Hat Matrix</div>
      <div class="card">Gradient Descent</div>
      <div class="card">Eigen Intuition</div>
    </div>
  </section>

</div>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load", () => {

  // 🔥 MASTER TIMELINE (REAL APPLE STYLE)
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: ".stage",
      start: "top top",
      end: "+=150%",
      scrub: true
    }
  });

  // HERO fades out
  tl.to(".hero", {
    opacity: 0,
    scale: 0.98,
    ease: "power2.out"
  });

  // CONTENT fades in OVER HERO (no scrolling into next section)
  tl.to(".content", {
    opacity: 1,
    ease: "power2.out"
  }, "<0.2");

  // CARDS stagger reveal
  tl.to(".card", {
    opacity: 1,
    y: 0,
    stagger: 0.15,
    ease: "power3.out"
  }, "-=0.3");

});
</script>

</body>
</html>
