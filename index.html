<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 200vh; /* allows scroll */
  background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,0.5), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(99,102,241,0.4), transparent 50%),
    #020617;
  color: white;
}

/* HERO */
.hero {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;

  transition: opacity 0.2s linear;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(56,189,248,0.3);
}

.intro {
  color: #94a3b8;
  max-width: 700px;
  line-height: 1.7;
}

/* SCROLL TEXT */
.scroll-text {
  margin-top: 40px;
  font-size: 0.9rem;
  color: #cbd5f5;
  opacity: 0.8;
}

/* CONTENT */
.content {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  transform: translateY(40px);
  transition: all 0.3s ease;
}

.inner {
  max-width: 900px;
  width: 100%;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

/* CARDS */
.card {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 25px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: rgba(56,189,248,0.6);
  box-shadow: 0 10px 30px rgba(56,189,248,0.2);
}

.card-title {
  font-size: 1.2rem;
  margin-bottom: 10px;
}

.card-desc {
  color: #cbd5f5;
  font-size: 0.9rem;
}

a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>AI Beyond the Surface</h1>
  <div class="intro">
    <p>Breaking down machine learning beyond formulas into intuition.</p>
  </div>
  <div class="scroll-text">Scroll to explore ↓</div>
</div>

<!-- CONTENT -->
<div class="content" id="content">
  <div class="inner">
    <div class="grid">

      <a href="/hat-matrix">
        <div class="card">
          <div class="card-title">Hat Matrix</div>
          <div class="card-desc">Projection & geometry</div>
        </div>
      </a>

      <a href="/gradient-descent">
        <div class="card">
          <div class="card-title">Gradient Descent</div>
          <div class="card-desc">Optimization intuition</div>
        </div>
      </a>

      <a href="/eigen-intuition">
        <div class="card">
          <div class="card-title">Eigen Intuition</div>
          <div class="card-desc">Directions & transformations</div>
        </div>
      </a>

    </div>
  </div>
</div>

<script>
const hero = document.getElementById("hero");
const content = document.getElementById("content");

window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;
  const maxScroll = window.innerHeight;

  const progress = Math.min(scrollY / maxScroll, 1);

  /* fade out hero */
  hero.style.opacity = 1 - progress;
  hero.style.transform = `translateY(-${progress * 50}px)`;

  /* fade in content */
  content.style.opacity = progress;
  content.style.transform = `translateY(${40 - progress * 40}px)`;
});
</script>

</body>
</html>
