<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,0.5), transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(99,102,241,0.4), transparent 50%),
    #020617;
  color: white;
  overflow-x: hidden;
}

/* SECTION BASE */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

/* HERO */
.hero {
  flex-direction: column;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(56,189,248,0.3);
}

.intro {
  color: #94a3b8;
  max-width: 700px;
}

/* CONTENT */
.content {
  opacity: 0;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  max-width: 900px;
  width: 100%;
  padding: 20px;
}

/* CARDS */
.card {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 25px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  border-color: rgba(56,189,248,0.6);
  box-shadow: 0 10px 30px rgba(56,189,248,0.2);
}

.card-title {
  font-size: 1.2rem;
  margin-bottom: 10px;
}

.card-desc {
  color: #cbd5f5;
}

a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>AI Beyond the Surface</h1>
  <div class="intro">
    Breaking down machine learning beyond formulas into intuition.
  </div>
</section>

<!-- CONTENT -->
<section class="content">
  <div class="grid">

    <a href="/hat-matrix">
      <div class="card">
        <div class="card-title">Hat Matrix</div>
        <div class="card-desc">Projection & geometry</div>
      </div>
    </a>

    <a href="/gradient-descent">
      <div class="card">
        <div class="card-title">Gradient Descent</div>
        <div class="card-desc">Optimization intuition</div>
      </div>
    </a>

    <a href="/eigen-intuition">
      <div class="card">
        <div class="card-title">Eigen Intuition</div>
        <div class="card-desc">Directions & transformations</div>
      </div>
    </a>

  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* PIN HERO + ANIMATE */
gsap.timeline({
  scrollTrigger: {
    trigger: ".hero",
    start: "top top",
    end: "+=100%",
    scrub: true,
    pin: true
  }
})
.to(".hero", {
  opacity: 0,
  y: -100
})
.to(".content", {
  opacity: 1,
  y: -100
}, "<");
</script>

</body>
</html>
