<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* STAGE */
.stage {
  position: relative;
  height: 200vh;
}

/* OVERLAY SECTIONS */
.hero, .content {
  position: fixed;
  inset: 0;
  height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* HERO */
.hero {
  background: radial-gradient(circle at 30% 30%, #1e3a8a, transparent 60%);
  z-index: 2;
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
}

/* CONTENT */
.content {
  background: #0b1220;
  z-index: 1;
  opacity: 0;
  align-items: flex-start;
  padding-top: 10vh;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
  width: 80%;
  padding: 40px 0;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 25px;
  border-radius: 14px;
  opacity: 0;
  transform: translateY(40px);

  /* smooth interaction */
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

/* ✨ GLOW EFFECT */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(56,189,248,0.25), transparent 60%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

/* HOVER PREMIUM EFFECT */
.card:hover {
  transform: translateY(-6px) scale(1.02);
  border-color: rgba(56,189,248,0.7);
  box-shadow: 0 0 25px rgba(56,189,248,0.25);
}

.card:hover::before {
  opacity: 1;
}

.card h3 {
  margin-bottom: 8px;
}

.card p {
  color: #cbd5f5;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="stage">

  <!-- HERO -->
  <section class="hero">
    <h1>AI Beyond the Surface</h1>
    <p>Scroll to explore</p>
  </section>

  <!-- CONTENT -->
  <section class="content">
    <div class="grid">

      <div class="card">
        <h3>Hat Matrix</h3>
        <p>Projection & geometry intuition</p>
      </div>

      <div class="card">
        <h3>Gradient Descent</h3>
        <p>Optimization intuition</p>
      </div>

      <div class="card">
        <h3>Eigen Intuition</h3>
        <p>Linear transformations & directions</p>
      </div>

    </div>
  </section>

</div>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load", () => {

  // CLEAN INITIAL STATE
  gsap.set(".content", { opacity: 0 });
  gsap.set(".card", { opacity: 0, y: 40 });

  // HERO TRANSITION
  gsap.to(".hero", {
    opacity: 0,
    y: -120,
    ease: "power2.out",
    scrollTrigger: {
      trigger: ".stage",
      start: "top top",
      end: "+=140%",
      scrub: true,
      pin: true,
      anticipatePin: 1
    }
  });

  // CONTENT FADE IN
  gsap.to(".content", {
    opacity: 1,
    ease: "power3.out",
    scrollTrigger: {
      trigger: ".content",
      start: "top 70%",
      toggleActions: "play none none reverse"
    }
  });

  // CARD STAGGER (clean + balanced)
  gsap.to(".card", {
    opacity: 1,
    y: 0,
    stagger: {
      each: 0.12,
      from: "start"
    },
    duration: 0.7,
    ease: "power3.out",
    scrollTrigger: {
      trigger: ".content",
      start: "top 70%",
      toggleActions: "play none none reverse"
    }
  });

});
</script>

</body>
</html>
