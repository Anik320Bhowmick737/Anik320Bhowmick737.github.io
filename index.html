<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #020617;
  color: white;
}

section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  flex-direction: column;
}

.hero h1 {
  font-size: 3rem;
}

.content {
  opacity: 1; /* IMPORTANT: keep visible for debugging */
  padding: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  max-width: 900px;
}

.card {
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}
</style>
</head>

<body>

<section class="hero">
  <h1>AI Beyond the Surface</h1>
</section>

<section class="content">
  <div class="grid">

    <div class="card">Hat Matrix</div>
    <div class="card">Gradient Descent</div>
    <div class="card">Eigen Intuition</div>

  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load", () => {

  gsap.timeline({
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=100%",
      scrub: true,
      pin: true
    }
  })
  .to(".hero", {
    opacity: 0,
    y: -80
  })
  .from(".content", {
    opacity: 0,
    y: 100
  });

});
</script>

</body>
</html>
