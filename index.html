<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* SECTIONS */
section {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  position: relative;
}

/* HERO */
.hero {
  background: radial-gradient(circle at 30% 30%, #1e3a8a, transparent 60%);
}

.hero h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero p {
  color: #94a3b8;
}

/* CONTENT */
.content {
  background: #0b1220;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  width: 80%;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 12px;

  /* IMPORTANT: initial state controlled by GSAP */
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>AI Beyond the Surface</h1>
  <p>Scroll to explore</p>
</section>

<!-- CONTENT -->
<section class="content">
  <div class="grid">

    <div class="card">Hat Matrix</div>
    <div class="card">Gradient Descent</div>
    <div class="card">Eigen Intuition</div>

  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load", () => {

  // 🔥 FORCE CLEAN INITIAL STATES (critical fix)
  gsap.set(".content", { opacity: 0, y: 80 });
  gsap.set(".card", { opacity: 0, y: 40 });

  // =========================
  // 1. HERO PIN + FADE OUT
  // =========================
  gsap.to(".hero", {
    opacity: 0,
    y: -120,
    ease: "power2.out",
    scrollTrigger: {
      trigger: ".hero",
      start: "top top",
      end: "+=140%",
      scrub: true,
      pin: true,
      anticipatePin: 1
    }
  });

  // =========================
  // 2. CONTENT FADE IN (NOT scrubbed → IMPORTANT)
  // =========================
  gsap.to(".content", {
    opacity: 1,
    y: 0,
    duration: 1.2,
    ease: "power3.out",
    scrollTrigger: {
      trigger: ".content",
      start: "top 75%",
      toggleActions: "play none none reverse"
    }
  });

  // =========================
  // 3. CARD STAGGER (Apple feel)
  // =========================
  gsap.to(".card", {
    opacity: 1,
    y: 0,
    stagger: 0.12,
    duration: 0.8,
    ease: "power3.out",
    scrollTrigger: {
      trigger: ".content",
      start: "top 75%",
      toggleActions: "play none none reverse"
    }
  });

});
</script>

</body>
</html>
