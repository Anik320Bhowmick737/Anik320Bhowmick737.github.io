<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anik | AI Notes</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* SCROLL SPACE */
.wrapper {
  height: 200vh; /* creates scroll distance */
}

/* STAGE */
.stage {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
}

/* LAYERS */
.layer {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* HERO */
.hero {
  background: radial-gradient(circle at 30% 30%, #1e3a8a, transparent 60%);
  z-index: 2;
}

/* CONTENT */
.content {
  background: #0b1220;
  z-index: 1;
  opacity: 0;
  padding-top: 10vh;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 30px;
  width: 80%;
  max-width: 1000px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 25px;
  border-radius: 14px;

  opacity: 0;
  transform: translateY(40px);

  transition: all 0.3s ease;
}

/* ✨ GLOW */
.card:hover {
  transform: translateY(-8px) scale(1.03);
  border-color: #38bdf8;
  box-shadow:
    0 0 20px rgba(56,189,248,0.3),
    0 0 40px rgba(56,189,248,0.2);
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="stage">

    <!-- HERO -->
    <div class="layer hero">
      <h1>AI Beyond the Surface</h1>
      <p>Scroll to explore</p>
    </div>

    <!-- CONTENT -->
    <div class="layer content">
      <div class="grid">
        <div class="card">
          <h3>Hat Matrix</h3>
          <p>Projection & geometry intuition</p>
        </div>

        <div class="card">
          <h3>Gradient Descent</h3>
          <p>Optimization intuition</p>
        </div>

        <div class="card">
          <h3>Eigen Intuition</h3>
          <p>Linear transformations</p>
        </div>
      </div>
    </div>

  </div>

</div>

<script>
gsap.registerPlugin(ScrollTrigger);

window.addEventListener("load", () => {

  // MASTER TIMELINE
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: ".wrapper",
      start: "top top",
      end: "bottom top",
      scrub: 1
    }
  });

  // HERO FADE OUT
  tl.to(".hero", {
    opacity: 0,
    scale: 0.98,
    ease: "power2.out"
  });

  // CONTENT FADE IN (overlay, not scroll)
  tl.to(".content", {
    opacity: 1,
    ease: "power2.out"
  }, "<0.2");

  // CARD STAGGER
  tl.to(".card", {
    opacity: 1,
    y: 0,
    stagger: 0.15,
    ease: "power3.out"
  }, "-=0.3");

});
</script>

</body>
</html>
